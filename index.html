<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>駅別乗降客数マップ</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header id="control-bar">
    <h1>駅別乗降客数マップ</h1>
    <div class="controls">
      <div class="control-group">
        <label for="threshold-select">表示閾値</label>
        <select id="threshold-select">
          <option value="0">すべて表示</option>
          <option value="30000" selected>30,000人以上</option>
          <option value="100000">100,000人以上</option>
        </select>
      </div>
      <div class="control-group">
        <label for="search-input">駅検索</label>
        <input type="text" id="search-input" placeholder="駅名を入力...">
        <ul id="search-results"></ul>
      </div>
    </div>
  </header>
  <div id="map"></div>

  <footer id="data-source">
    出典: <a href="https://nlftp.mlit.go.jp/ksj/gml/datalist/KsjTmplt-S12-2023.html" target="_blank" rel="noopener">国土数値情報「駅別乗降客数データ」(国土交通省, 2023年度)</a>
    ｜地図: <a href="https://www.openstreetmap.org/copyright" target="_blank" rel="noopener">OpenStreetMap</a>
  </footer>

  <div id="table-panel">
    <button id="table-toggle">一覧を表示 ▼</button>
    <div id="table-tabs">
      <button class="tab-btn active" data-tab="region">地域別一覧</button>
      <button class="tab-btn" data-tab="capital">都道府県代表駅ランキング</button>
      <button class="tab-btn-expand" id="table-expand">全画面表示</button>
    </div>
    <div id="table-content" data-active-tab="region">
      <div id="tab-region" class="tab-pane active"></div>
      <div id="tab-capital" class="tab-pane"></div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
